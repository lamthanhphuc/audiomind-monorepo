name: security-recheck

on:
  pull_request:
    branches: [main, master]

jobs:
  recheck:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python audit tools
        run: |
          python -m pip install --upgrade pip pip-audit pytest pytest-cov

      - name: pip-audit ai-service
        run: pip-audit -r demoRecordAUDIOMID/ai-service/requirements.txt

      - name: pip-audit whisper-service
        run: pip-audit -r demoRecordAUDIOMID/whisper-service/requirements.txt

      - name: pip-audit diarization-service
        run: pip-audit -r demoRecordAUDIOMID/diarization-service/requirements.txt

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: OWASP dependency-check (Java)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          cd demoRecordAUDIOMID
          ./mvnw -q -pl user-service -DskipTests org.owasp:dependency-check-maven:check -Dformat=JSON -DnvdApiKey=${NVD_API_KEY} -DknownExploitedEnabled=true
          ./mvnw -q -pl meeting-service -DskipTests org.owasp:dependency-check-maven:check -Dformat=JSON -DnvdApiKey=${NVD_API_KEY} -DknownExploitedEnabled=true
          ./mvnw -q -pl processing-service -DskipTests org.owasp:dependency-check-maven:check -Dformat=JSON -DnvdApiKey=${NVD_API_KEY} -DknownExploitedEnabled=true

      - name: Run full unit tests (Java)
        run: |
          cd demoRecordAUDIOMID
          ./mvnw -q -pl user-service test
          ./mvnw -q -pl meeting-service test
          ./mvnw -q -pl processing-service test

      - name: Run full integration tests (Python)
        run: |
          pytest demoRecordAUDIOMID/ai-service/test_api.py -q

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: FE install
        run: |
          cd FE-Audiomind
          npm ci

      - name: FE unit coverage
        run: |
          cd FE-Audiomind
          npm run test:coverage

      - name: FE e2e (integration)
        run: |
          cd FE-Audiomind
          npx playwright test --retries=1

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: k6 smoke test
        run: k6 run tests/load/k6-script.js
