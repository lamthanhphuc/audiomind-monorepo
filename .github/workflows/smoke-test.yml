name: Smoke Test E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  smoke-test:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start stack
        shell: pwsh
        run: |
          docker compose -f infra/docker-compose.dev.yml up -d --build --no-deps db redis ai-api celery-worker meeting-api processing-api

      - name: Setup ffmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress

      - name: Convert mp3 to wav
        shell: pwsh
        run: |
          $inputPath = "${{ github.workspace }}/tests/audio/it-overview.mp3"
          $outputPath = "${{ github.workspace }}/tests/audio/it-overview.wav"
          if (-not (Test-Path -LiteralPath $inputPath)) {
            throw "Input audio file not found: $inputPath"
          }
          ffmpeg -y -i "$inputPath" "$outputPath"

      - name: Run smoke script
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts/smoke-e2e.ps1 -AudioFile "${{ github.workspace }}/tests/audio/it-overview.wav" -AiBaseUrl http://localhost:8000 -ProcessingBaseUrl http://localhost:8082 -PollIntervalSeconds 2 -TimeoutSeconds 120

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            logs/smoke-test-report.md
            logs/smoke-*.log

      - name: Teardown stack
        if: always()
        shell: pwsh
        run: |
          docker compose -f infra/docker-compose.dev.yml down -v
