name: Smoke Test E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - production-ready

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check E2E secrets
        id: check-e2e-secrets
        shell: pwsh
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:E2E_USERNAME)) {
            $missing += "E2E_USERNAME"
          }
          if ([string]::IsNullOrWhiteSpace($env:E2E_PASSWORD)) {
            $missing += "E2E_PASSWORD"
          }
          if ($missing.Count -gt 0) {
            Write-Host "ENVIRONMENT_BLOCKED: Missing required secrets: $($missing -join ', ')"
            "skip_e2e=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "skip_e2e=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Report environment blocked
        if: steps.check-e2e-secrets.outputs.skip_e2e == 'true'
        shell: pwsh
        run: |
          Write-Host "ENVIRONMENT_BLOCKED: Smoke test skipped because required E2E secrets are missing."

      - name: Start stack
        if: steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        shell: pwsh
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            docker compose -f infra/docker-compose.dev.yml up -d --build db redis user-api ai-api celery-worker meeting-api processing-api
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "docker compose startup failed after $maxAttempts attempts"
            }
            Start-Sleep -Seconds (5 * $attempt)
          }

        - name: Debug - Collect service logs on failure
          if: failure()
          shell: pwsh
          run: |
            docker compose -f infra/docker-compose.dev.yml ps
            docker compose -f infra/docker-compose.dev.yml logs user-api --tail 500
            docker compose -f infra/docker-compose.dev.yml logs db --tail 100

      - name: Setup smoke E2E account
        if: steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        shell: pwsh
        env:
          E2E_USER_SERVICE_BASE_URL: http://localhost:8083
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          $deadline = (Get-Date).AddMinutes(3)
          while ((Get-Date) -lt $deadline) {
            try {
              Invoke-RestMethod -Method Get -Uri "http://localhost:8083/actuator/health" -TimeoutSec 5 | Out-Null
              break
            } catch {
              Start-Sleep -Seconds 5
            }
          }
          ./scripts/setup-e2e-account.ps1

      - name: Setup ffmpeg
        if: steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        shell: pwsh
        run: |
          if ($env:RUNNER_OS -eq "Windows") {
            choco install ffmpeg -y --no-progress
          } else {
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          }

      - name: Convert mp3 to wav
        if: steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        shell: pwsh
        run: |
          $inputPath = "${{ github.workspace }}/tests/audio/it-overview.mp3"
          $outputPath = "${{ github.workspace }}/tests/audio/it-overview.wav"
          if (-not (Test-Path -LiteralPath $inputPath)) {
            throw "Input audio file not found: $inputPath"
          }
          ffmpeg -y -i "$inputPath" "$outputPath"

      - name: Run smoke script
        if: steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        shell: pwsh
        env:
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
        run: |
          $maxAttempts = 3
          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            ./scripts/smoke-e2e.ps1 -AudioFile "${{ github.workspace }}/tests/audio/it-overview.wav" -AiBaseUrl http://localhost:8000 -ProcessingBaseUrl http://localhost:8082 -UserServiceBaseUrl http://localhost:8083 -E2EUsername "$env:E2E_USERNAME" -E2EPassword "$env:E2E_PASSWORD" -PollIntervalSeconds 2 -TimeoutSeconds 300
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq $maxAttempts) {
              throw "smoke script failed after $maxAttempts attempts"
            }
            Start-Sleep -Seconds (5 * $attempt)
          }

      - name: Upload smoke artifacts
        if: always() && steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: |
            logs/smoke-test-report.md
            logs/smoke-*.log

      - name: Teardown stack
        if: always() && steps.check-e2e-secrets.outputs.skip_e2e != 'true'
        shell: pwsh
        run: |
          docker compose -f infra/docker-compose.dev.yml down -v
