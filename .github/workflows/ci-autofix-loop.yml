name: CI Auto-Fix Loop

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run in dry-run mode (no commit/push/trigger/cancel)
        required: false
        default: 'true'
      poll_seconds:
        description: Poll interval in seconds
        required: false
        default: '30'
      target_branch:
        description: Branch to open fix PR into
        required: false
        default: 'main'
      source_branch:
        description: Source branch used for restoration recipes
        required: false
        default: 'production-ready'
      lock_timeout_minutes:
        description: Lock staleness timeout in minutes
        required: false
        default: '30'
      enable_auto_merge:
        description: Enable auto-merge on the created PR
        required: false
        default: 'false'
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: ci-autofix-${{ github.event.inputs.target_branch || 'main' }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  pull-requests: write

jobs:
  run-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitHub CLI
        run: gh --version

      - name: Preflight auth and repository
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh auth status
          gh repo view

      - name: Run post-merge CI auto-fix iteration
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
        run: |
          $poll = [int]('${{ github.event.inputs.poll_seconds || '30' }}')
          $lockTimeout = [int]('${{ github.event.inputs.lock_timeout_minutes || '30' }}')
          $target = '${{ github.event.inputs.target_branch || 'main' }}'
          $source = '${{ github.event.inputs.source_branch || 'production-ready' }}'
          $enableAutoMerge = '${{ github.event.inputs.enable_auto_merge || 'false' }}'
          if ($enableAutoMerge -eq 'true') {
            ./scripts/ci-fix/ci-fix-iteration.ps1 -TargetBranch $target -SourceBranch $source -PollSeconds $poll -LockTimeoutMinutes $lockTimeout -EnableAutoMerge
          }
          else {
            ./scripts/ci-fix/ci-fix-iteration.ps1 -TargetBranch $target -SourceBranch $source -PollSeconds $poll -LockTimeoutMinutes $lockTimeout
          }
