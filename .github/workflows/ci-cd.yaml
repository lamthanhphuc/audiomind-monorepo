name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - production-ready

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Java services
        working-directory: demoRecordAUDIOMID
        run: mvn -B clean compile -DskipTests

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r demoRecordAUDIOMID/ai-service/requirements.txt
          pip install -r demoRecordAUDIOMID/ai-processing-service/requirements.txt
          pip install -r demoRecordAUDIOMID/whisper-service/requirements.txt
          pip install -r demoRecordAUDIOMID/diarization-service/requirements.txt

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Java tests
        working-directory: demoRecordAUDIOMID
        run: mvn -B test

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Python tests
        run: |
          python -m pip install --upgrade pip
          pip install -r demoRecordAUDIOMID/ai-service/requirements.txt
          pip install pytest
          pytest demoRecordAUDIOMID/ai-service/test_api.py

  docker-build-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ai-api image
        uses: docker/build-push-action@v6
        with:
          context: demoRecordAUDIOMID/ai-service
          file: demoRecordAUDIOMID/ai-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.DOCKER_USERNAME }}/audiomind-ai-api:${{ github.sha }}
            ghcr.io/${{ secrets.DOCKER_USERNAME }}/audiomind-ai-api:latest

      - name: Build and push user-api image
        uses: docker/build-push-action@v6
        with:
          context: demoRecordAUDIOMID/user-service
          file: demoRecordAUDIOMID/user-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ secrets.DOCKER_USERNAME }}/audiomind-user-api:${{ github.sha }}
            ghcr.io/${{ secrets.DOCKER_USERNAME }}/audiomind-user-api:latest

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to staging namespace
        run: |
          kubectl apply -k k8s/overlays/prod
          kubectl rollout status deployment/user-api-deployment -n audiomind --timeout=120s
