apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-api-deployment
  namespace: audiomind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-api
  template:
    metadata:
      labels:
        app: ai-api
    spec:
      containers:
        - name: ai-api
          image: audiomind/ai-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: audiomind-secrets
                  key: DATABASE_URL
            - name: OTEL_SERVICE_NAME
              value: ai-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: AI_PROVIDER
              value: ollama
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: OLLAMA_MODEL
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: audiomind-secrets
                  key: HUGGINGFACE_TOKEN
            - name: ENABLE_SPEAKER_DIARIZATION
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: ENABLE_SPEAKER_DIARIZATION
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: CORS_ALLOWED_ORIGINS
          volumeMounts:
            - name: model-cache
              mountPath: /app/models
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              cpu: 1500m
              memory: 3Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-deployment
  namespace: audiomind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: audiomind/ai-api:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "celery -A app.celery_app.celery_app worker --loglevel=INFO --concurrency=${CELERY_CONCURRENCY} --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER}"]
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: audiomind-secrets
                  key: DATABASE_URL
            - name: AI_PROVIDER
              value: ollama
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: OLLAMA_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: OLLAMA_MODEL
            - name: HUGGINGFACE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: audiomind-secrets
                  key: HUGGINGFACE_TOKEN
            - name: ENABLE_SPEAKER_DIARIZATION
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: ENABLE_SPEAKER_DIARIZATION
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/0
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/1
            - name: JOB_STATE_REDIS_URL
              value: redis://redis:6379/2
            - name: CELERY_CONCURRENCY
              value: "4"
            - name: CELERY_PREFETCH_MULTIPLIER
              value: "1"
            - name: WORKER_HEALTH_PORT
              value: "8080"
          volumeMounts:
            - name: model-cache
              mountPath: /app/models
            - name: uploads
              mountPath: /app/uploads
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: model-cache-pvc
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
