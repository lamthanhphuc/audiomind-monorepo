apiVersion: apps/v1
kind: Deployment
metadata:
  name: meeting-api-deployment
  namespace: audiomind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meeting-api
  template:
    metadata:
      labels:
        app: meeting-api
    spec:
      containers:
        - name: meeting-api
          image: audiomind/meeting-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://db:5432/audiomind
            - name: OTEL_SERVICE_NAME
              value: meeting-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://jaeger:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: audiomind-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: audiomind-secrets
                  key: POSTGRES_PASSWORD
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: audiomind-config
                  key: CORS_ALLOWED_ORIGINS
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 300m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
---
