apiVersion: v1
kind: ConfigMap
metadata:
  name: audiomind-config
  namespace: audiomind
data:
  POSTGRES_DB: audiomind
  POSTGRES_HOST: db
  POSTGRES_PORT: "5432"
  CORS_ALLOWED_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
  AUDIOMIND_AI_API_BASE_URL: http://ai-api:8000
  AUDIOMIND_MEETING_API_BASE_URL: http://meeting-api:8081
  OLLAMA_BASE_URL: http://ollama-service:11434
  OLLAMA_MODEL: qwen2.5:3b-instruct
  ENABLE_SPEAKER_DIARIZATION: "false"
  WHISPER_SERVICE_URL: http://whisper-service:8011
  DIARIZATION_SERVICE_URL: http://diarization-service:8012
