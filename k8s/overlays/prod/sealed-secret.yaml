---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: audiomind-secrets
  namespace: audiomind
spec:
  encryptedData:
    # Replace each placeholder with output from: kubeseal --format yaml
    DATABASE_URL: REPLACE_WITH_SEALED_DATABASE_URL
    DB_USERNAME: REPLACE_WITH_SEALED_DB_USERNAME
    DB_PASSWORD: REPLACE_WITH_SEALED_DB_PASSWORD
    POSTGRES_USER: REPLACE_WITH_SEALED_POSTGRES_USER
    POSTGRES_PASSWORD: REPLACE_WITH_SEALED_POSTGRES_PASSWORD
    JWT_SECRET: REPLACE_WITH_SEALED_JWT_SECRET
    HUGGINGFACE_TOKEN: REPLACE_WITH_SEALED_HUGGINGFACE_TOKEN
    GF_SECURITY_ADMIN_USER: REPLACE_WITH_SEALED_GF_SECURITY_ADMIN_USER
    GF_SECURITY_ADMIN_PASSWORD: REPLACE_WITH_SEALED_GF_SECURITY_ADMIN_PASSWORD
  template:
    metadata:
      annotations:
        sealedsecrets.bitnami.com/managed: "true"
      name: audiomind-secrets
      namespace: audiomind

