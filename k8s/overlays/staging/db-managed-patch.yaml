apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-api-deployment
  namespace: audiomind-staging
spec:
  template:
    spec:
      containers:
        - name: user-api
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: DATABASE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: DB_PASSWORD
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: audiomind-staging
spec:
  replicas: 0
