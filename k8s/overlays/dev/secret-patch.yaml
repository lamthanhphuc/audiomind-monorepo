apiVersion: v1
kind: Secret
metadata:
  name: audiomind-secrets
  namespace: audiomind
type: Opaque
stringData:
  POSTGRES_USER: dev_user
  POSTGRES_PASSWORD: dev_password
  DATABASE_URL: postgresql://dev_user:dev_password@db:5432/audiomind
  USER_JWT_SECRET: replace-this-secret-with-at-least-32-bytes-for-dev
  GF_SECURITY_ADMIN_USER: admin
  GF_SECURITY_ADMIN_PASSWORD: dev_admin_password
  HUGGINGFACE_TOKEN: ""
