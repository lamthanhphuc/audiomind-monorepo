apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: processing-api
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - audiomind
  selector:
    matchLabels:
      app: processing-api
      monitoring: "enabled"
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
