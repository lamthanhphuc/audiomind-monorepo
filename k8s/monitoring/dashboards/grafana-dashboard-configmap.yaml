apiVersion: v1
kind: ConfigMap
metadata:
  name: audiomind-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  audiomind-overview.json: |
    {
      "title": "AudioMind Overview",
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "type": "timeseries",
          "title": "HTTP request rate (all services)",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[5m])) by (service)",
              "legendFormat": "{{service}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
        },
        {
          "type": "timeseries",
          "title": "Container CPU usage",
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"audiomind\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
        }
      ]
    }
