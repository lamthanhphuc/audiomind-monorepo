apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ai-api-canary-virtualservice
  namespace: audiomind
spec:
  hosts:
    - "*"
  gateways:
    - audiomind-gateway
  http:
    - match:
        - uri:
            prefix: /api/ai
      route:
        - destination:
            host: ai-api
            subset: stable
            port:
              number: 8000
          weight: 90
        - destination:
            host: ai-api
            subset: canary
            port:
              number: 8000
          weight: 10
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ai-api-canary-destinationrule
  namespace: audiomind
spec:
  host: ai-api
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary
