syntax = "proto3";

package audiomind.realtime;

message AudioChunk {
  int64 meeting_id = 1;
  int64 seq = 2;
  int64 ts_ms = 3;
  int32 sample_rate = 4;
  bytes pcm_chunk = 5;
}

message TranscriptPartialEvent {
  int64 meeting_id = 1;
  string segment_id = 2;
  double start_time = 3;
  double end_time = 4;
  string speaker = 5;
  string text = 6;
  string language = 7;
  string version_hash = 8;
}

message KeywordHitEvent {
  int64 meeting_id = 1;
  string term = 2;
  double timestamp = 3;
  string domain = 4;
  string version_hash = 5;
  string keyword_id = 6;
  float confidence = 7;
  repeated int32 ranges = 8;
}

message StreamEnvelope {
  string event_id = 1;
  string event_type = 2;
  string trace_id = 3;
  int64 emitted_at_ms = 4;
  oneof payload {
    AudioChunk audio_chunk = 5;
    TranscriptPartialEvent transcript_partial = 6;
    KeywordHitEvent keyword_hit = 7;
  }
}
