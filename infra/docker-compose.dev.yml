services:
  meeting-api:
    build:
      context: ../demoRecordAUDIOMID
      dockerfile: meeting-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-audiomind}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-audiomind}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-audiomind}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080}
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    ports:
      - "8081:8081"

  processing-api:
    build:
      context: ../demoRecordAUDIOMID
      dockerfile: processing-service/Dockerfile
    container_name: processing-api
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx1024m -Xms512m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof -Xlog:gc*:file=/tmp/gc.log:time,level,tags
      - AUDIOMIND_AI_API_BASE_URL=http://ai-api:8000
      - AUDIOMIND_MEETING_API_BASE_URL=http://meeting-api:8081
      - REDIS_HOST=redis
      - REDIS_DB=2
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080}
    depends_on:
      - meeting-api
      - ai-api
    volumes:
      - uploads:/app/uploads
    ports:
      - "8082:8082"

  user-api:
    build:
      context: ../demoRecordAUDIOMID
      dockerfile: user-service/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-audiomind}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-audiomind}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-audiomind}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=3
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://localhost:3000,http://127.0.0.1:8080,http://localhost:8080}
    depends_on:
      - db
      - redis
    ports:
      - "8083:8083"

  ai-api:
    build: ../demoRecordAUDIOMID/ai-service
    container_name: ai-api
    env_file:
      - ../demoRecordAUDIOMID/ai-service/.env
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DEEPGRAM_MODEL=nova-2
      - DEEPGRAM_BASE_URL=${DEEPGRAM_BASE_URL:-https://api.deepgram.com/v1/listen}
      # Diagnostic only; keep false for normal dev/prod behavior.
      - DEEPGRAM_SIMPLIFY_STREAMING_URL=${DEEPGRAM_SIMPLIFY_STREAMING_URL:-false}
      # Diagnostic only; logs capped raw Deepgram text frames when true.
      - DEEPGRAM_DEBUG_RAW_MESSAGES=${DEEPGRAM_DEBUG_RAW_MESSAGES:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-audiomind}:${POSTGRES_PASSWORD:-audiomind}@db:5432/${POSTGRES_DB:-audiomind}
      - STT_PROVIDER=${STT_PROVIDER:-deepgram}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - DEEPGRAM_REALTIME_MODEL=${DEEPGRAM_REALTIME_MODEL:-nova-2}
      - DEEPGRAM_BATCH_MODEL=${DEEPGRAM_BATCH_MODEL:-nova-2}
      - DEEPGRAM_LANGUAGE=${DEEPGRAM_LANGUAGE:-vi}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - ANALYSIS_PROVIDER=${ANALYSIS_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_ANALYSIS_MODEL=${OPENAI_ANALYSIS_MODEL:-}
      - OPENAI_SUMMARY_MODEL=${OPENAI_SUMMARY_MODEL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_ANALYSIS_MODEL=${GEMINI_ANALYSIS_MODEL:-gemini-2.5-flash}
      - GEMINI_SUMMARY_MODEL=${GEMINI_SUMMARY_MODEL:-gemini-2.5-flash}
      - LOCAL_WHISPER_ENABLED=${LOCAL_WHISPER_ENABLED:-true}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=http://ollama-service:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - ENABLE_SPEAKER_DIARIZATION=${ENABLE_SPEAKER_DIARIZATION:-false}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - JOB_STATE_REDIS_URL=redis://redis:6379/2
      - STT_ENABLE_DISTRIBUTED_OWNERSHIP=${STT_ENABLE_DISTRIBUTED_OWNERSHIP:-true}
      - STT_OWNERSHIP_ENABLED=${STT_OWNERSHIP_ENABLED:-true}
      - STT_OWNERSHIP_REDIS_URL=${STT_OWNERSHIP_REDIS_URL:-redis://redis:6379/2}
      - STT_REPLICA_ID=${STT_REPLICA_ID:-}
      - STT_OWNERSHIP_LEASE_TTL_SECONDS=${STT_OWNERSHIP_LEASE_TTL_SECONDS:-30}
      - STT_OWNERSHIP_COOLDOWN_TTL_SECONDS=${STT_OWNERSHIP_COOLDOWN_TTL_SECONDS:-300}
    depends_on:
      - db
      - ollama-service
      - redis
    volumes:
      - model_cache:/app/models
      - uploads:/app/uploads
      - job_status:/app/storage
    ports:
      - "8000:8000"

  celery-worker:
    build: ../demoRecordAUDIOMID/ai-service
    container_name: celery-worker
    command: sh -c "celery -A app.celery_app.celery_app worker --loglevel=INFO --concurrency=${CELERY_CONCURRENCY:-4} --prefetch-multiplier=${CELERY_PREFETCH_MULTIPLIER:-1}"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-audiomind}:${POSTGRES_PASSWORD:-audiomind}@db:5432/${POSTGRES_DB:-audiomind}
      - STT_PROVIDER=${STT_PROVIDER:-deepgram}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - DEEPGRAM_REALTIME_MODEL=${DEEPGRAM_REALTIME_MODEL:-nova-2}
      - DEEPGRAM_BATCH_MODEL=${DEEPGRAM_BATCH_MODEL:-nova-2}
      - DEEPGRAM_LANGUAGE=${DEEPGRAM_LANGUAGE:-vi}
      - DEEPGRAM_BASE_URL=${DEEPGRAM_BASE_URL:-https://api.deepgram.com/v1/listen}
      - LOCAL_WHISPER_ENABLED=${LOCAL_WHISPER_ENABLED:-true}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - ANALYSIS_PROVIDER=${ANALYSIS_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_ANALYSIS_MODEL=${OPENAI_ANALYSIS_MODEL:-}
      - OPENAI_SUMMARY_MODEL=${OPENAI_SUMMARY_MODEL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_ANALYSIS_MODEL=${GEMINI_ANALYSIS_MODEL:-gemini-2.5-flash}
      - GEMINI_SUMMARY_MODEL=${GEMINI_SUMMARY_MODEL:-gemini-2.5-flash}
      - OLLAMA_ENABLED=${OLLAMA_ENABLED:-false}
      - OLLAMA_BASE_URL=http://ollama-service:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b-instruct}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - ENABLE_SPEAKER_DIARIZATION=${ENABLE_SPEAKER_DIARIZATION:-false}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - JOB_STATE_REDIS_URL=redis://redis:6379/2
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-4}
      - CELERY_PREFETCH_MULTIPLIER=${CELERY_PREFETCH_MULTIPLIER:-1}
      - WORKER_HEALTH_PORT=8080
    depends_on:
      - ai-api
      - db
      - redis
      - ollama-service
    volumes:
      - model_cache:/app/models
      - uploads:/app/uploads
      - job_status:/app/storage
    ports:
      - "8088:8080"

  whisper-service:
    build: ../demoRecordAUDIOMID/whisper-service
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - model_cache:/app/models
      - uploads:/app/uploads
    ports:
      - "8011:8011"

  diarization-service:
    build: ../demoRecordAUDIOMID/diarization-service
    environment:
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
    volumes:
      - model_cache:/app/models
      - uploads:/app/uploads
    ports:
      - "8012:8012"

  ollama-service:
    image: ollama/ollama:0.5.1
    container_name: ollama-service
    volumes:
      - ollama_cache:/root/.ollama
    ports:
      - "11434:11434"
    command: ["serve"]

  processing-service:
    build: ../demoRecordAUDIOMID/ai-processing-service
    depends_on:
      - whisper-service
      - diarization-service
      - ollama-service
    environment:
      - WHISPER_SERVICE_URL=http://whisper-service:8011
      - DIARIZATION_SERVICE_URL=http://diarization-service:8012
      - OLLAMA_BASE_URL=http://ollama-service:11434
      - OLLAMA_MODEL=qwen2.5:3b
    volumes:
      - uploads:/app/uploads
    ports:
      - "8010:8010"

  web:
    build:
      context: ..
      dockerfile: FE-Audiomind/Dockerfile
      args:
        VITE_MEETING_API_BASE_URL: http://localhost:8081
        VITE_PROCESSING_API_BASE_URL: http://localhost:8082
        VITE_USER_API_BASE_URL: http://localhost:8083
        VITE_API_BASE: http://localhost:8082
        VITE_API_CPU_BASE: http://localhost:8000
        VITE_API_GPU_BASE: http://localhost:8001
        VITE_AI_SERVICE_URL: http://localhost:8000
        VITE_REALTIME_WS_ENABLED: "true"
        VITE_REALTIME_WS_BASE_URL: ws://localhost:8082/ws/meetings
    ports:
      - "8080:80"

  db:
    image: postgres:15.7
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-audiomind}
      - POSTGRES_USER=${POSTGRES_USER:-audiomind}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-audiomind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2.5-alpine
    ports:
      - "6379:6379"

volumes:
  model_cache:
  uploads:
  job_status:
  ollama_cache:
  postgres_data:
