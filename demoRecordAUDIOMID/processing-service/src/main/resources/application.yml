server:
  port: 8082
  tomcat:
    # WebSocket buffer sizes - 512MB to handle large transcripts
    web-socket-max-text-message-size: 536870912 # 512MB
    web-socket-max-binary-message-size: 536870912 # 512MB
    # HTTP buffer sizes
    max-http-form-post-size: 536870912 # 512MB
    max-http-header-size: 16384 # 16KB header size
    max-swallow-size: 536870912 # 512MB
    # Connection timeouts
    connection-timeout: 60000ms # 60 seconds
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.example.processingservice.security.JwtAuthenticationFilter: DEBUG
    com.example.processingservice.interfaces.websocket: DEBUG
    org.springframework.security: DEBUG

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:2}
  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

audiomind:
  ai-api:
    base-url: ${AUDIOMIND_AI_API_BASE_URL:http://localhost:8000}
  meeting-api:
    base-url: ${AUDIOMIND_MEETING_API_BASE_URL:http://localhost:8081}

ai:
  service:
    url: ${AUDIOMIND_AI_API_BASE_URL:http://localhost:8000}
    connect-timeout-ms: ${AI_SERVICE_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${AI_SERVICE_READ_TIMEOUT_MS:180000}

meeting:
  service:
    url: ${AUDIOMIND_MEETING_API_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:86400}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

resilience4j:
  retry:
    instances:
      ai-service:
        max-attempts: 4
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      ai-service:
        failure-rate-threshold: 25
        wait-duration-in-open-state: 10s
        sliding-window-size: 10