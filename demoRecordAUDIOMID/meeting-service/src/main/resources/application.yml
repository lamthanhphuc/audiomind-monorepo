server:
  port: 8081
  tomcat:
    uri-encoding: UTF-8
    max-http-form-post-size: 210MB
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 210MB

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: ${SPRING_JPA_HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_schema_history_meeting

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:86400}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}